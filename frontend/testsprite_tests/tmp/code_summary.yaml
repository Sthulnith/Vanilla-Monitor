version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React
  - Next.js (App Router)
  - Lucide React
  - Tailwind CSS
  - IndexedDB (idb library)
  - Google Identity Services (GIS) API
routes:
  - path: /
    file: src/app/page.tsx
    auth_required: false
    description: Landing and Splash page with Google OAuth SSO and developer login bypass.
  - path: /dashboard
    file: src/app/dashboard/page.tsx
    auth_required: true
    description: Supervisor main dashboard showing inspection metrics and offline sync status.
  - path: /inspect
    file: src/app/inspect/layout.tsx
    auth_required: true
    description: Layout for the 5-step inspection form flow.
  - path: /inspect/step1
    file: src/app/inspect/step1/page.tsx
    auth_required: true
    description: Step 1 of inspection - Zone, Block, and Plant ID selection.
  - path: /inspect/step2
    file: src/app/inspect/step2/page.tsx
    auth_required: true
    description: Step 2 of inspection - Botanical details (foliage color, flowers, vine condition).
  - path: /inspect/step3
    file: src/app/inspect/step3/page.tsx
    auth_required: true
    description: Step 3 of inspection - Environmental care details (watering, soil pH, temperature, humidity).
  - path: /inspect/step4
    file: src/app/inspect/step4/page.tsx
    auth_required: true
    description: Step 4 of inspection - Growth parameters (vine height, delta height, dead vines/trees).
  - path: /inspect/step5
    file: src/app/inspect/step5/page.tsx
    auth_required: true
    description: Step 5 of inspection - Final submission, notes, and photo capture/upload.
  - path: /history
    file: src/app/history/page.tsx
    auth_required: true
    description: Historic overview of logged inspections with sync statuses.
  - path: /profile
    file: src/app/profile/page.tsx
    auth_required: true
    description: Supervisor profile page with sync controls and settings.
  - path: /digital-twin
    file: src/app/digital-twin/page.tsx
    auth_required: true
    description: Leaflet map representing plantation digital twin layout.
features:
  - name: Supervisor Login
    description: Access the supervisor portal using developer credential bypass or Google SSO.
    files:
      - src/app/page.tsx
      - src/lib/authService.ts
    entry_route: /
    user_interactions:
      - Fill supervisor email field
      - Fill password field
      - Click Sign In as Supervisor button
      - Click Sign in with Google button
    api_calls:
      - method: GET
        endpoint: https://www.googleapis.com/oauth2/v3/userinfo
    auth_required: false
  - name: Multi-Step Plant Inspection
    description: 5-step form to collect detailed crop, environmental, and visual measurements.
    files:
      - src/app/inspect/step1/page.tsx
      - src/app/inspect/step2/page.tsx
      - src/app/inspect/step3/page.tsx
      - src/app/inspect/step4/page.tsx
      - src/app/inspect/step5/page.tsx
    entry_route: /inspect/step1
    user_interactions:
      - Select Zone card
      - Select Block card
      - Fill Plant ID input
      - Click Next button
      - Fill botanical and soil/temperature conditions
      - Select/take photo of plant
      - Click Submit button
    api_calls: []
    auth_required: true
  - name: Offline Sync to Google Workspace
    description: Save submissions locally to IndexedDB while offline and auto-sync when online.
    files:
      - src/lib/syncService.ts
      - src/lib/sheetsService.ts
      - src/lib/driveService.ts
      - src/lib/offline-db.ts
    entry_route: /dashboard
    user_interactions:
      - Click Sync queue or trigger sync in Profile page
    api_calls:
      - method: POST
        endpoint: https://www.googleapis.com/upload/drive/v3/files
      - method: POST
        endpoint: https://sheets.googleapis.com/v4/spreadsheets/{spreadsheetId}/values/Observations!A:AM:append
    auth_required: true
known_limitations: []
